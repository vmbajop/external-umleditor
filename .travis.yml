language: java
  
branches:
  only:
    - master
    - stable

install: true
  
script: 
  - if [ $TRAVIS_BRANCH == "stable" ]; then ./gradlew '-Drelease=' build ; fi
  - if [ $TRAVIS_BRANCH != "stable" ]; then ./gradlew build ; fi
  
deploy:
  - provider: script
    skip_cleanup: true
    script: ./gradlew -Drepos_pwd=${repos_pwd} -Drepos_usr=${repos_usr} -Drepos_url=${repos_url} uploadArchives
    on:
      branch: master
  - provider: script
    skip_cleanup: true
    script: ./gradlew -Drepos_pwd=${repos_pwd} -Drepos_usr=${repos_usr} -Drepos_url=${repos_url} '-Drelease=' -Ddownloads_pwd=${downloads_pwd} -Ddownloads_usr=jql_downloads uploadArchives uploadBin
    on:
      branch: stable
